version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline --no-audit --no-fund --legacy-peer-deps --include=optional
        - npm install --no-save @parcel/watcher-linux-x64-glibc@2.5.6 @rollup/rollup-linux-x64-gnu@4.60.1
        - node -e "require('@parcel/watcher-linux-x64-glibc'); console.log('parcel watcher linux prebuild loaded')"
        - node -e "require('@rollup/rollup-linux-x64-gnu'); console.log('rollup linux prebuild loaded')"
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
